<!DOCTYPE html>
<html lang="en">

<title>MOVs Repository</title>

<!-- =========================
        CSS STYLE SECTION
========================= -->

<style>

/* GLOBAL SETTINGS */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:transparent;
    overflow-x:hidden;
    color:white;
}
 
/* Animated background effect */
body::before{
    content:"";
    position:fixed;
    inset:0;
    pointer-events:none;
    background:
    repeating-linear-gradient(
        90deg,
        rgba(255,255,255,0.03),
        rgba(255,255,255,0.03) 2px,
        transparent 2px,
        transparent 90px
    );
    animation:wind 12s linear infinite;
}

@keyframes wind{

    from{
        transform:translateX(-120px);
    }
    to{
        transform:translateX(120px);
    }
}

/* MAIN TITLE */

h1{
    text-align:center;
    padding:25px;
    font-size:42px;
    text-shadow:
    0 0 10px #7de9ff;
}

/* MAIN CONTAINER */

.container{
    display:flex;
    justify-content:center;
    gap:140px;
    margin-top:30px;
}
 
.main{
    text-align:center;
}

/* MAIN BALL BUTTON */

.ball{
    width:170px;
    height:170px;
    border-radius:50%;
    cursor:pointer;

    /* Metallic Silver Ring */
    border:6px solid transparent;
    background:
        linear-gradient(145deg,
            #ffffff 0%,
            #f2f2f2 8%,
            #d9d9d9 18%,
            #bfbfbf 28%,
            #f8f8f8 40%,
            #8d8d8d 52%,
            #ffffff 65%,
            #d0d0d0 78%,
            #9c9c9c 90%,
            #fefefe 100%) border-box,

        /* Sky Blue Metallic Sphere */
        radial-gradient(circle at 30% 25%,
            #ffffff 0%,
            #dff8ff 10%,
            #a8ebff 22%,
            #71d7ff 40%,
            #42bff5 58%,
            #2f9fdf 72%,
            #247db7 86%,
            #154d78 100%) padding-box;

    background-origin:border-box;
    background-clip:border-box,padding-box;

    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;

    color:#fff;
    font-size:22px;
    font-weight:bold;
    text-shadow:
        0 1px 2px rgba(0,0,0,.6),
        0 0 8px rgba(255,255,255,.5);

    box-shadow:
        inset 0 10px 25px rgba(255,255,255,.65),
        inset 0 -15px 30px rgba(0,0,0,.25),
        0 0 15px rgba(0,180,255,.55),
        0 12px 28px rgba(0,0,0,.35);

    animation:goo 3s ease-in-out infinite;
    transition:.35s;
}

.ball:hover{
    transform:scale(1.08);
    box-shadow:
        inset 0 12px 28px rgba(255,255,255,.8),
        inset 0 -18px 35px rgba(0,0,0,.3),
        0 0 25px rgba(135,206,250,.9),
        0 18px 35px rgba(0,0,0,.45);
}

.ball::before{
    content:"";
    position:absolute;
    width:55%;
    height:30%;
    top:18px;
    left:28px;
    border-radius:50%;
    background:rgba(255,255,255,.45);
    filter:blur(4px);
}

.ball{
    position:relative;
    overflow:hidden;
} 
        
@keyframes goo{

    50%{
        transform:scale(1.05,.95);
    }
}

/* FOLDER LEVELS */

.level,
.level2{
    display:none;
    flex-direction:column;
    gap:10px;
    margin-top:15px;
}

/* FOLDER BUTTON */

.folder{
    background:#f0c14b;
    color:#222;
    padding:10px 18px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

/* DOCUMENT LINKS */

.sub{
    background:#9dd8ff;
    color:#003;
    padding:8px;
    border-radius:6px;
    text-decoration:none;
}

/* FOOTER */

footer{
    position:fixed;
    bottom:10px;
    width:100%;
    text-align:center;
    font-size:13px;
}

</style>

</head>

<body>

<!-- =========================
        JAVASCRIPT SECTION
========================= -->

<script>

function toggle(id){

    let element=document.getElementById(id);

    // Hide other main categories

    if(element.classList.contains("level")){

        document
        .querySelectorAll(".level")
        .forEach(item=>{

            if(item !== element){

                item.style.display="none";
            }
        });
    }

    // Open / Close selected folder

    element.style.display =

    element.style.display==="flex"

    ? "none"

    : "flex";
}

</script>
