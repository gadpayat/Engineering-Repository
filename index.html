<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOVs Repository</title>

<!-- =========================
        CSS STYLE SECTION
========================= -->

<style>

/* GLOBAL SETTINGS */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:transparent;
    overflow-x:hidden;
    color:white;
}
 
/* Animated background effect */
body::before{
    content:"";
    position:fixed;
    inset:0;
    pointer-events:none;
    background:
    repeating-linear-gradient(
        90deg,
        rgba(255,255,255,0.03),
        rgba(255,255,255,0.03) 2px,
        transparent 2px,
        transparent 90px
    );
    animation:wind 12s linear infinite;
}

@keyframes wind{

    from{
        transform:translateX(-120px);
    }
    to{
        transform:translateX(120px);
    }
}

/* MAIN TITLE */

h1{
    text-align:center;
    padding:25px;
    font-size:42px;
    text-shadow:
    0 0 10px #7de9ff;
}

/* MAIN CONTAINER */

.container{
    display:flex;
    justify-content:center;
    gap:140px;
    margin-top:30px;
}
 
.main{
    text-align:center;
}

/* MAIN BALL BUTTON */

.ball{
    width:170px;
    height:170px;
    border-radius:50%;
    cursor:pointer;
    border:6px solid #bbb;
    background:
    radial-gradient(
        circle at 30% 30%,
        #c8f7ff,
        #4cccf5,
        #2a86bb
    );
    box-shadow:
    inset 0 0 30px rgba(255,255,255,.7),
    0 0 25px #66ddff;
    animation:goo 3s ease-in-out infinite;
}

@keyframes goo{

    50%{
        transform:scale(1.05,.95);
    }
}

/* FOLDER LEVELS */

.level,
.level2{
    display:none;
    flex-direction:column;
    gap:10px;
    margin-top:15px;
}

/* FOLDER BUTTON */

.folder{
    background:#f0c14b;
    color:#222;
    padding:10px 18px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

/* DOCUMENT LINKS */

.sub{
    background:#9dd8ff;
    color:#003;
    padding:8px;
    border-radius:6px;
    text-decoration:none;
}

/* FOOTER */

footer{
    position:fixed;
    bottom:10px;
    width:100%;
    text-align:center;
    font-size:13px;
}

</style>

</head>

<body>

<h1>MOVs Repository</h1>

<!-- =========================
        MAIN BUTTON SECTION
========================= -->

<div class="container">

<!-- =========================

========================= -->

<div class="main">

onclick="event.stopPropagation();toggle('m1f1')">

<!-- =========================
        JAVASCRIPT SECTION
========================= -->

<script>

function toggle(id){

    let element=document.getElementById(id);

    // Hide other main categories

    if(element.classList.contains("level")){

        document
        .querySelectorAll(".level")
        .forEach(item=>{

            if(item !== element){

                item.style.display="none";
            }
        });
    }

    // Open / Close selected folder

    element.style.display =

    element.style.display==="flex"

    ? "none"

    : "flex";
}

</script>

</body>
