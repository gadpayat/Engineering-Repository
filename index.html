<!DOCTYPE html>

<!-- =========================
        CSS STYLE SECTION
========================= -->

<style>

/* GLOBAL SETTINGS */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:transparent;
    overflow-x:hidden;
    color:white;
}
 
/* Animated background effect */
body::before{
    content:"";
    position:fixed;
    inset:0;
    pointer-events:none;
    background:
    repeating-linear-gradient(
        90deg,
        rgba(255,255,255,0.03),
        rgba(255,255,255,0.03) 2px,
        transparent 2px,
        transparent 90px
    );
    animation:wind 12s linear infinite;
}

@keyframes wind{

    from{
        transform:translateX(-120px);
    }
    to{
        transform:translateX(120px);
    }
}

/* MAIN TITLE */

h1{
    text-align:center;
    padding:25px;
    font-size:42px;
    text-shadow:
    0 0 10px #7de9ff;
}

/* MAIN CONTAINER */

.container{
    display:flex;
    justify-content:center;
    gap:140px;
    margin-top:30px;
}
 
.main{
    text-align:center;
}

/* MAIN BALL BUTTON */

.ball{
    width:170px;
    height:170px;
    border-radius:50%;
    position:relative;
    overflow:hidden;
    cursor:pointer;

    /* Metallic Silver Ring */
    border:10px solid transparent;
background:
linear-gradient(145deg,
#ffffff 0%,
#f7f7f7 8%,
#d8d8d8 18%,
#a8a8a8 28%,
#fdfdfd 42%,
#7d7d7d 58%,
#f8f8f8 72%,
#bcbcbc 86%,
#ffffff 100%) border-box,

linear-gradient(145deg,
#f7fdff 0%,
#d6f5ff 8%,
#9ee8ff 16%,
#68d3ff 24%,
#3fb8f2 34%,
#8be6ff 44%,
#2698d7 56%,
#75dfff 66%,
#1d7fbc 78%,
#4cc7f7 90%,
#d9f8ff 100%) padding-box;

background-origin:border-box;
background-clip:border-box,padding-box;

    /* Metallic Sky Blue */
    background:
    radial-gradient(circle at 28% 22%,
        rgba(255,255,255,.95) 0%,
        rgba(255,255,255,.45) 12%,
        transparent 18%),

    linear-gradient(145deg,
        #f7fdff 0%,
        #d6f5ff 8%,
        #9ee8ff 16%,
        #68d3ff 24%,
        #3fb8f2 34%,
        #8be6ff 44%,
        #2698d7 56%,
        #75dfff 66%,
        #1d7fbc 78%,
        #4cc7f7 90%,
        #d9f8ff 100%);

    display:flex;
    justify-content:center;
    align-items:center;

    color:#fff;
    font-size:22px;
    font-weight:bold;
    text-align:center;
    text-shadow:
        0 1px 2px rgba(0,0,0,.6),
        0 0 8px rgba(255,255,255,.4);

    box-shadow:
        inset 0 10px 20px rgba(255,255,255,.7),
        inset 0 -15px 20px rgba(0,0,0,.25),
        0 0 18px rgba(64,190,255,.6),
        0 12px 24px rgba(0,0,0,.35);

    animation:goo 3s ease-in-out infinite;
    transition:.35s;
}

.ball:hover{
    transform:scale(1.08);
    box-shadow:
        inset 0 12px 28px rgba(255,255,255,.8),
        inset 0 -18px 35px rgba(0,0,0,.3),
        0 0 25px rgba(135,206,250,.9),
        0 18px 35px rgba(0,0,0,.45);
}

.ball::before{
    content:"";
    position:absolute;
    width:55%;
    height:30%;
    top:18px;
    left:28px;
    border-radius:50%;
    background:rgba(255,255,255,.45);
    filter:blur(4px);
}

.ball{
    position:relative;
    overflow:hidden;
} 
        
@keyframes goo{

    50%{
        transform:scale(1.05,.95);
    }

.ball::after{
    content:"";
    position:absolute;
    top:-20%;
    left:-70%;
    width:40%;
    height:140%;
    background:rgba(255,255,255,.35);
    transform:rotate(25deg);
    animation:metalShine 3s linear infinite;
}

@keyframes metalShine{
    from{left:-70%;}
    to{left:140%;}
}
        
}

/* FOLDER LEVELS */

.level,
.level2{
    display:none;
    flex-direction:column;
    gap:10px;
    margin-top:15px;
}

/* FOLDER BUTTON */

.folder{
    background:#f0c14b;
    color:#222;
    padding:10px 18px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

/* DOCUMENT LINKS */

.sub{
    background:#9dd8ff;
    color:#003;
    padding:8px;
    border-radius:6px;
    text-decoration:none;
}

/* FOOTER */

footer{
    position:fixed;
    bottom:10px;
    width:100%;
    text-align:center;
    font-size:13px;
}

</style>

</head>

<!-- =========================

<script>

function toggle(id){

    let element=document.getElementById(id);

    // Hide other main categories

    if(element.classList.contains("level")){

        document
        .querySelectorAll(".level")
        .forEach(item=>{

            if(item !== element){

                item.style.display="none";
            }
        });
    }

    // Open / Close selected folder

    element.style.display =

    element.style.display==="flex"

    ? "none"

    : "flex";
}

</script>
