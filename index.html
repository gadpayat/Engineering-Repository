<!DOCTYPE html>
<html lang="en">

<meta charset="UTF-8">

<title>MOVs Repository</title>


<!-- ==============================
        CSS STYLE SECTION
================================= -->

<style>

/* GLOBAL SETTINGS */

*{
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}


html,
body{

    margin:0;

    background:transparent;

    color:#fff;

}



/* MAIN CONTAINER */

.container{

    display:flex;

    justify-content:center;

    gap:120px;

    padding:30px;

}



.main{

    text-align:center;

}



/* TITLE */

h1{

    text-align:center;

}



/* OUTER RING BUTTON */

.ring{

    width:182px;

    height:182px;

    padding:6px;

    border-radius:50%;


    background:

    linear-gradient(
        145deg,
        #fff,
        #ddd,
        #999,
        #fff,
        #777,
        #fff
    );


    cursor:pointer;

}



/* INNER BALL */

.ball{

    width:100%;

    height:100%;


    border-radius:50%;


    display:flex;

    align-items:center;

    justify-content:center;


    text-align:center;


    font-weight:bold;

    font-size:22px;


    background:

    linear-gradient(
        145deg,
        #f7fdff,
        #d6f5ff,
        #9ee8ff,
        #68d3ff,
        #3fb8f2,
        #8be6ff,
        #2698d7,
        #75dfff,
        #1d7fbc,
        #d9f8ff
    );

}



/* FOLDER DISPLAY LEVELS */

.level,
.level2{

    display:none;

    flex-direction:column;

    gap:8px;

    margin-top:10px;

}



/* FOLDER BUTTON */

.folder{

    background:#e7c04a;

    color:#222;

    padding:10px;

    border-radius:8px;

    cursor:pointer;

}



/* SUB FOLDER LINKS */

.sub{

    display:block;

    background:#bfe8ff;

    color:#003;

    text-decoration:none;

    padding:8px;

    border-radius:6px;

}



</style>


</head>

<!-- ==============================
        JAVASCRIPT SECTION
================================= -->


<script>


// Open main category
// Automatically closes other categories

function toggleMain(id){


    document
    .querySelectorAll('.level')
    .forEach(function(item){


        if(item.id !== id){

            item.style.display="none";

        }


    });



    let element=document.getElementById(id);



    element.style.display =

    element.style.display==="flex"

    ? "none"

    : "flex";


}





// Open sub folders

function toggleSub(event,id){


    event.stopPropagation();



    let element=document.getElementById(id);



    element.style.display =

    element.style.display==="flex"

    ? "none"

    : "flex";


}



</script>
